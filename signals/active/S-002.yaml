vision: |
  OpenAgentEngine is an open-source game engine for AI agents and human game
  lovers to collaborate. It redefines what a "game engine" means — do not be
  constrained by traditional game engine concepts.

  TARGET USERS:
  - Game enthusiasts who love playing games
  - People who may not know how to code or develop games
  - People with taste, who enjoy experimenting with new gameplay
  - People who want to modify games to their liking and share with others

  CORE MECHANISM:
  - Built-in AI agent called "engineAI"
  - Human users communicate with engineAI via natural language
  - Natural language drives game modifications, new gameplay creation, etc.

  UX PRINCIPLES:
  - High-frequency actions (start, debug, etc.) → buttons for intuitive interaction
  - Creative/modification work → natural language conversation with engineAI
  - This is an evolving principle — optimize continuously as the software develops

  IDENTITY:
  - Open source
  - AI-human collaborative
  - Creativity-first, code-optional for end users
