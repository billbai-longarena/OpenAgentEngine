id: O-001
pattern: "Termite Protocol lacks a 'Project Charter' layer between protocol and state"
context: "TERMITE_PROTOCOL.md — information architecture"
reporter: "termite:2026-02-28:scout"
confidence: high
created: 2026-02-28
source: autonomous
detail: |
  The protocol defines three information layers:
  - Protocol layer (P0, immutable): HOW to collaborate
  - Entry layer (P1, append-only): project quick reference
  - State layer (P2, audited): WHAT is happening now

  Missing: a "Project Charter" layer for project-specific permanent beliefs
  and design principles — WHO we are, WHAT we build, WHY we make certain choices.

  Current workarounds are all inadequate:
  - S-002 (founding vision signal) will decay and archive
  - CLAUDE.md project overview is too brief
  - BLACKBOARD.md is dynamic state, not permanent principles
  - TERMITE_PROTOCOL.md is domain-agnostic, can't hold project specifics

  Recommendation: Projects should have a P1-protected CHARTER.md (or equivalent)
  that instantiates the three-mound model, defines design principles, and serves
  as the permanent identity anchor. The protocol should suggest this convention.
