name: verify-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify quality gate
        run: pnpm run verify:gate
        env:
          S015_REQUIRE_LIVE_BRANCH_PROTECTION: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '1' || '0' }}
          S015_REPO: ${{ github.repository }}
          BRANCH_PROTECTION_AUDIT_TOKEN: ${{ secrets.BRANCH_PROTECTION_AUDIT_TOKEN }}
